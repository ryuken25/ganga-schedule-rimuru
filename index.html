<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ganga's Schedule</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div class="bg-bubbles" aria-hidden="true">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <main class="wrap">
    <header class="refHeader">
      <div class="refMonthJp" id="monthJp">...</div>
      
      <div class="refTitleWrap">
        <h1 class="refTitle">ガンガのスケジュール</h1>
        <div class="refMonthId" id="monthId">Loading...</div>
      </div>

      <div class="refControls">
        <button class="btnIcon" id="modeBtn" type="button" title="Ganti Mode">🗑️</button>
        <button class="btnIcon" id="prevBtn" type="button" title="Bulan Lalu">←</button>
        <button class="btnIcon" id="nextBtn" type="button" title="Bulan Depan">→</button>
      </div>
    </header>

    <section class="board">
      <div class="dow">
        <div class="dowCell">日</div>
        <div class="dowCell">月</div>
        <div class="dowCell">火</div>
        <div class="dowCell">水</div>
        <div class="dowCell">木</div>
        <div class="dowCell">金</div>
        <div class="dowCell">土</div>
      </div>

      <div class="grid" id="calendarGrid"></div>
    </section>
  </main>

  <img class="cute" src="./assets/chibi.gif" alt="Rimuru" id="mascot" onerror="this.style.display='none'" />

  <div id="rimuruModal" class="rimuru-modal" aria-hidden="true">
    <div class="modal-content">
      <span class="close-btn" id="closeModal">&times;</span>
      
      <div class="modal-header">
        <h2 id="modalDate">DD/MM</h2>
        <span id="modalShiftBadge">Shift</span>
      </div>
      
      <div class="modal-body">
        <p id="modalKeterangan">...</p>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
