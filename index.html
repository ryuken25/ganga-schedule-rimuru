<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ガンガのスケジュール</title>
  <meta name="description" content="Jadwal bulanan yang ngeload data dari Google Sheets." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-bubbles" aria-hidden="true"></div>

  <main class="wrap">
    <!-- Header ala referensi -->
    <header class="refHeader" aria-label="Header jadwal">
      <div class="refMonthJp" id="monthJp">1月</div>

      <div class="refTitleWrap">
        <h1 class="refTitle">ガンガのスケジュール</h1>
        <div class="refControls" aria-label="Kontrol kalender">
          <button class="btnIcon" id="prevBtn" type="button" aria-label="Bulan sebelumnya" title="Bulan sebelumnya">←</button>
          <button class="btnIcon" id="nextBtn" type="button" aria-label="Bulan berikutnya" title="Bulan berikutnya">→</button>
        </div>
      </div>

      <div class="refMonthId" id="monthId">Januari 2026</div>
    </header>

    <section class="board" aria-label="Jadwal bulanan">
      <div class="dow" aria-hidden="true">
        <div class="dowCell">日</div>
        <div class="dowCell">月</div>
        <div class="dowCell">火</div>
        <div class="dowCell">水</div>
        <div class="dowCell">木</div>
        <div class="dowCell">金</div>
        <div class="dowCell">土</div>
      </div>

      <div class="grid" id="calendarGrid" role="grid" aria-label="Kalender"></div>

      <!-- mascot kanan bawah board -->
      <img class="mascot" src="./assets/slime_mascot.png" alt="" aria-hidden="true" />
    </section>
  </main>

  <!-- cute slime fixed kiri bawah -->
  <img class="cute" src="./assets/cute_slime.gif" alt="" aria-hidden="true" />

  <script src="./script.js"></script>
</body>
</html>
